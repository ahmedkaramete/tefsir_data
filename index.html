<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — Nüzul Zaman Şeridi</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0b1e}
#app{width:100%;height:100vh;background:#0b0b1e;overflow:hidden;position:relative;font-family:system-ui,sans-serif}
canvas#stars{position:absolute;inset:0;pointer-events:none;z-index:0}

#topbar{
  position:absolute;top:0;left:0;right:0;height:52px;
  background:rgba(11,11,30,.96);
  border-bottom:.5px solid rgba(201,169,110,.2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:30;gap:10px;
}
.brand-ar{font-family:'Amiri',serif;font-size:17px;color:#c9a96e;direction:rtl;line-height:1}
.brand-sub{font-size:7.5px;color:rgba(201,169,110,.42);letter-spacing:2px;margin-top:1px}

#srch-wrap{position:relative;flex:1;max-width:280px}
#srch{width:100%;background:rgba(201,169,110,.08);border:.5px solid rgba(201,169,110,.28);border-radius:20px;color:#e8e0d0;padding:5px 12px 5px 30px;font-size:11px;outline:none;}
#srch::placeholder{color:rgba(201,169,110,.32)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.45}
#sr{position:absolute;top:34px;left:0;right:0;min-width:320px;background:rgba(8,8,26,.98);border:.5px solid rgba(201,169,110,.28);border-radius:8px;max-height:300px;overflow-y:auto;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.7)}
#sr.open{display:block}
#sr::-webkit-scrollbar{width:3px}
#sr::-webkit-scrollbar-thumb{background:rgba(201,169,110,.3)}
.sri{padding:7px 11px;border-bottom:.5px solid rgba(201,169,110,.08);cursor:pointer;display:grid;grid-template-columns:105px 1fr;gap:7px}
.sri:hover{background:rgba(201,169,110,.09)}
.sri-m{font-size:9px;color:rgba(201,169,110,.62);line-height:1.5}
.sri-t{font-size:10.5px;color:rgba(220,210,190,.78);line-height:1.5}
.hl{color:#c9a96e;background:rgba(201,169,110,.14);border-radius:2px;padding:0 2px}
.srl{padding:10px;text-align:center;color:rgba(201,169,110,.38);font-size:11px}

/* TÜMÜNÜ GÖSTER BUTONU */
.btn-sira{
  background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.15);
  border-radius:16px;color:rgba(255,255,255,.45);padding:5px 12px;font-size:10px;
  cursor:pointer;white-space:nowrap;transition:all .2s;
}
.btn-sira:hover{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.4);color:#c9a96e}
.btn-sira.aktif{background:rgba(201,169,110,.14);border-color:rgba(201,169,110,.6);color:#c9a96e}
#btn-fit{
  background:rgba(201,169,110,.1);
  border:.5px solid rgba(201,169,110,.35);
  color:#c9a96e;
  padding:5px 12px;border-radius:16px;
  font-size:10px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:background .15s;
}
#btn-fit:hover{background:rgba(201,169,110,.2)}

/* FERSAH GÖSTERGESİ */
#fersah{
  position:absolute;top:60px;right:14px;
  font-size:9px;color:rgba(201,169,110,.45);
  letter-spacing:.5px;z-index:10;
  pointer-events:none;
}

/* YIL BANDI */
#year-band{
  position:absolute;top:0;left:0;
  height:160px;
  display:flex;flex-direction:row;
  pointer-events:none;z-index:5;
  transform-origin:left top;
}
.yb-seg{
  flex-shrink:0;height:160px;
  display:flex;align-items:center;padding:0 6px;
  font-size:8.5px;letter-spacing:.4px;
  border-right:1px solid rgba(201,169,110,.12);
  white-space:nowrap;
}
.yb-m{background:rgba(201,169,110,.06);color:rgba(201,169,110,.65)}
.yb-h{background:rgba(255,210,80,.12);color:rgba(255,210,100,.9);font-weight:700;border-color:rgba(255,210,80,.45)}
.yb-me{background:rgba(80,190,140,.06);color:rgba(80,190,140,.65)}

/* VIEWPORT */
#vp{
  position:absolute;inset:0;top:52px;
  overflow:hidden;cursor:grab;z-index:1;
}
#vp.panning{cursor:grabbing}

/* WORLD — tüm kartlar burada */
#world{position:absolute;top:0;left:0;transform-origin:left top;}

/* SÜTUN */
.nc{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;
  width:72px;
  user-select:none;-webkit-user-select:none;
}

/* SURE KARTI */
.nh{
  width:64px;
  background:linear-gradient(160deg,rgba(28,26,56,.96),rgba(18,16,44,.96));
  border:.5px solid rgba(201,169,110,.35);
  border-radius:6px;padding:5px 3px;
  text-align:center;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;
}
.nh:hover{border-color:rgba(201,169,110,.65)}
.nh.mekki{border-left:2px solid rgba(201,169,110,.6)}
.nh.medeni{border-left:2px solid rgba(80,190,140,.6)}
.nh-n{font-size:7px;color:rgba(201,169,110,.5)}
.nh-ar{font-size:11.5px;color:#d4b47a;font-family:'Amiri',serif;direction:rtl;line-height:1.3;margin:2px 0 1px}
.nh-tr{font-size:6.5px;color:rgba(218,212,196,.68);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.nh-ay{font-size:6px;color:rgba(201,169,110,.28);margin-top:1px}
.nih{display:flex;justify-content:center;gap:2px;margin-top:2px}

/* AYET PİLLİ */
.ap{
  width:56px;min-height:26px;
  background:rgba(255,255,255,.055);
  border:.5px solid rgba(255,255,255,.1);
  border-radius:4px;margin-top:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;padding:3px 2px;
  transition:background .12s,border-color .12s;
}
.ap:hover{background:rgba(201,169,110,.13);border-color:rgba(201,169,110,.38)}
.ap.mk{border-left:1.5px solid rgba(201,169,110,.52)}
.ap.md{border-left:1.5px solid rgba(80,190,140,.52)}
.ap-n{font-size:7px;color:rgba(201,169,110,.48)}
.ap-ar{font-size:7.5px;color:rgba(228,218,198,.48);font-family:'Amiri',serif;direction:rtl;text-align:center;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.leg{position:absolute;bottom:26px;right:14px;z-index:10;display:flex;flex-direction:column;gap:4px}
.li{display:flex;align-items:center;gap:5px;font-size:8.5px;color:rgba(201,169,110,.5)}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#hint{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:7.5px;color:rgba(201,169,110,.2);letter-spacing:1px;pointer-events:none;white-space:nowrap;z-index:10}

#loading{position:absolute;inset:52px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;gap:12px}
.ldot{display:flex;gap:7px}
.ldot span{width:6px;height:6px;border-radius:50%;background:#c9a96e;animation:ldp 1.2s infinite}
.ldot span:nth-child(2){animation-delay:.2s}
.ldot span:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.ltxt{font-size:13px;color:rgba(201,169,110,.52);font-family:'Amiri',serif}
.ltxt2{font-size:9px;color:rgba(201,169,110,.28);letter-spacing:2px;margin-top:3px}

/* MODAL */
#ov{position:absolute;inset:52px 0 0;background:rgba(4,4,18,.88);z-index:50;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#ov.open{display:flex}
#modal{width:480px;max-width:95vw;height:560px;background:linear-gradient(145deg,#0e0e2c,#181838);border:.5px solid rgba(201,169,110,.28);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;animation:mpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes mpop{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
#mflip{transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);flex:1;min-height:0;position:relative}
#mflip.fl{transform:rotateY(180deg)}
.mf{position:absolute;inset:0;backface-visibility:hidden;padding:20px;display:flex;flex-direction:column;overflow:hidden}
.mb{transform:rotateY(180deg);background:linear-gradient(145deg,#0a1d16,#10251e)}
.mcl{position:absolute;top:11px;right:13px;background:none;border:none;color:rgba(255,255,255,.28);font-size:16px;cursor:pointer;z-index:5}
.mcl:hover{color:rgba(255,255,255,.75)}
.mbdg{display:inline-flex;align-items:center;gap:5px;background:rgba(201,169,110,.09);border:.5px solid rgba(201,169,110,.2);border-radius:20px;padding:3px 10px;font-size:10px;color:#c9a96e;margin-bottom:7px;width:fit-content}
.mds{display:flex;gap:4px;margin-bottom:9px;flex-shrink:0;flex-wrap:wrap}
.dsb{font-size:8px;padding:2px 7px;border-radius:3px}
.ds1{background:rgba(201,169,110,.12);color:rgba(201,169,110,.8)}
.ds2{background:rgba(100,180,160,.12);color:rgba(100,180,160,.8)}
.ds3{background:rgba(140,140,210,.12);color:rgba(140,140,210,.8)}
.mar{font-family:'Amiri',serif;font-size:21px;line-height:1.9;direction:rtl;text-align:right;color:#f0e8d8;border-bottom:.5px solid rgba(255,255,255,.07);padding-bottom:9px;margin-bottom:9px;flex-shrink:0}
.mml{font-size:13px;line-height:1.8;color:rgba(220,210,195,.88);flex:1;overflow-y:auto}
.mml::-webkit-scrollbar{width:2px}
.mml::-webkit-scrollbar-thumb{background:rgba(201,169,110,.3)}
.mact{display:flex;gap:7px;margin-top:9px;flex-shrink:0}
.bt{flex:1;background:rgba(100,180,160,.08);border:.5px solid rgba(100,180,160,.3);color:#64b4a0;padding:8px;border-radius:7px;font-size:11px;cursor:pointer}
.bt:hover{background:rgba(100,180,160,.17)}
.bs{background:rgba(201,169,110,.07);border:.5px solid rgba(201,169,110,.25);color:#c9a96e;padding:8px 13px;border-radius:7px;font-size:11px;cursor:pointer}
.bs:hover{background:rgba(201,169,110,.14)}
.bs.pl{background:rgba(201,169,110,.22);border-color:#c9a96e}
.abar{height:2px;background:rgba(201,169,110,.1);border-radius:1px;margin-top:4px;flex-shrink:0}
.afil{height:100%;background:#c9a96e;width:0%;transition:width .3s;border-radius:1px}
.bh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;flex-shrink:0}
.bt2{font-size:12px;color:#64b4a0;font-weight:600}
.bbk{background:rgba(100,180,160,.07);border:.5px solid rgba(100,180,160,.26);color:#64b4a0;padding:4px 9px;border-radius:5px;font-size:10px;cursor:pointer}
.bsrc{font-size:9px;color:rgba(100,180,160,.42);background:rgba(100,180,160,.04);border:.5px solid rgba(100,180,160,.1);border-radius:4px;padding:3px 7px;margin-bottom:7px;flex-shrink:0}
.tbod{font-size:11.5px;line-height:1.85;color:rgba(210,230,225,.85);flex:1;overflow-y:auto;white-space:pre-wrap}
.tbod::-webkit-scrollbar{width:2px}
.tbod::-webkit-scrollbar-thumb{background:rgba(100,180,160,.3)}
.tpgr{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:6px;border-top:.5px solid rgba(100,180,160,.1);flex-shrink:0}
.tpb{background:rgba(100,180,160,.07);border:.5px solid rgba(100,180,160,.22);color:#64b4a0;padding:4px 11px;border-radius:5px;font-size:10px;cursor:pointer}
.tpb:hover{background:rgba(100,180,160,.16)}
.tpb:disabled{opacity:.28;cursor:not-allowed}
.tpi{font-size:9px;color:rgba(100,180,160,.48)}
.tload{font-size:11px;color:rgba(100,180,160,.48);text-align:center;padding:28px 18px;line-height:1.8}
</style>
</head>
<body>
<div id="app">
  <canvas id="stars"></canvas>

  <div id="topbar">
    <div>
      <div class="brand-ar">القرآن الكريم</div>
      <div class="brand-sub">NÜZUL ZAMAN ŞERİDİ · MEFÂTÎHU'L-GAYB</div>
    </div>
    <div id="srch-wrap">
      <svg class="si" width="13" height="13" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="#c9a96e" stroke-width="1.3"/>
        <path d="M10 10l3 3" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="srch" type="text" placeholder="Sure, ayet veya meal ara..." autocomplete="off">
      <div id="sr"></div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
      <button class="btn-sira aktif" id="btn-nuzul" onclick="siraDegis('nuzul')">Nüzul Sırası</button>
      <button class="btn-sira" id="btn-mushaf" onclick="siraDegis('mushaf')">Mushaf Sırası</button>
      <button id="btn-fit" onclick="fitAll()">⊞ Tümünü Göster</button>
    </div>
  </div>

  <div id="fersah">13. FERSAH</div>

  <div id="vp">
    <div id="year-band"></div>
    <div id="world"></div>
  </div>

  <div class="leg">
    <div class="li"><div class="ld" style="background:rgba(201,169,110,.72)"></div>Mekki</div>
    <div class="li"><div class="ld" style="background:rgba(80,190,140,.72)"></div>Medeni</div>
  </div>
  <div id="hint">TIK · YAKLAŞ &amp; ORTALA &nbsp;|&nbsp; 1-5. FERSAH: TIK · KART AÇ &nbsp;|&nbsp; SCROLL ↑ · ZOOM IN &nbsp;|&nbsp; SCROLL ↓ · ZOOM OUT</div>

    <div class="ldot"><span></span><span></span><span></span></div>
  </div>

  <div id="ov">
    <div id="modal">
      <div id="mflip">
        <div class="mf">
          <button class="mcl" onclick="closeM()">✕</button>
          <div class="mbdg" id="mbdg"></div>
          <div class="mds" id="mds"></div>
          <div class="mar" id="mar"></div>
          <div class="mml" id="mml"></div>
          <div class="mact">
            <!-- Tefsir şimdilik devre dışı -->
            <button class="bs" id="bses" onclick="togSes()">▶ Dinle</button>
          </div>
          <div class="abar"><div class="afil" id="afil"></div></div>
        </div>
        <div class="mf mb">
          <div class="bh">
            <div class="bt2" id="btit">Tefsir</div>
            <button class="bbk" onclick="flipM()">← Geri</button>
          </div>
          <div class="bsrc">Mefâtîhu'l-Gayb · Fahreddin er-Râzî (ö.606/1210) · Akçağ Yayınları</div>
          <div class="tbod" id="tbod"></div>
          <div class="tpgr" id="tpgr" style="display:none">
            <button class="tpb" id="tpg" onclick="tSayfa(-1)">← Önceki</button>
            <span class="tpi" id="tpi"></span>
            <button class="tpb" id="tpi2" onclick="tSayfa(1)">Sonraki →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

// ── ZOOM SİSTEMİ ──────────────────────────────────────────────────────
// 21 fersah: 21 = en uzak (tümü görünür), 1 = en yakın
// scale değerleri: fersah 21 → fitScale, fersah 1 → fitScale * 20^(20/20) gibi
// Logaritmik: her fersah bir öncekinin 1.18 katı daha büyük
const FERSAH_SAYISI = 13;
const ZOOM_CARPAN = 1.30; // her kademe bu kadar büyür
let fitScale = 1; // 21. fersah scale değeri (buildScene'de hesaplanır)
let fersah = 21;  // mevcut fersah (21=uzak, 1=yakın)
let scale = 1;
let tx = 0, ty = 0; // world'ün ekrandaki konumu

const COL_W = 72;
const YB_H = 160; // yıl bandı yüksekliği
let NUZUL = [];
let totalCols = 0;

function fersahToScale(f) {
  // Fersah 13 = fitScale, fersah 1 = fitScale * ZOOM_CARPAN^12
  return fitScale * Math.pow(ZOOM_CARPAN, 13 - f);
}

function scalToFersah(s) {
  // Tersine çevir
  const f = 13 - Math.log(s / fitScale) / Math.log(ZOOM_CARPAN);
  return Math.round(Math.max(1, Math.min(21, f)));
}

function updateFersahGosterge() {
  document.getElementById('fersah').textContent = fersah + '. FERSAH';
}

// ── TRANSFORM ────────────────────────────────────────────────────────
function applyT() {
  const w = document.getElementById('world');
  w.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  w.style.transformOrigin = 'left top';
  // Yıl bandı: aynı tx ama scale yatayda aynı, dikey sabit
  const yb = document.getElementById('year-band');
  yb.style.transform = `translateX(${tx}px) scaleX(${scale})`;
  yb.style.transformOrigin = 'left top';
}

// ── ANİMASYONLU ZOOM + PAN ───────────────────────────────────────────
function animateTo(targetTx, targetTy, targetScale, targetFersah, dur, cb) {
  const s0 = scale, tx0 = tx, ty0 = ty, t0 = performance.now();
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3); // ease out cubic
    scale = s0 + (targetScale - s0) * e;
    tx = tx0 + (targetTx - tx0) * e;
    ty = ty0 + (targetTy - ty0) * e;
    applyT();
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      scale = targetScale; tx = targetTx; ty = targetTy;
      fersah = targetFersah;
      updateFersahGosterge();
      applyT();
      if (cb) cb();
    }
  }
  requestAnimationFrame(step);
}

// ── TIK: YAKINLAŞ + ORTALA ─────────────────────────────────────────
function tikZoom(colX, colIdx, nuzulData, sno, ayetler, adim) {
  const vp = document.getElementById('vp');
  const vpW = vp.clientWidth;
  const vpH = vp.clientHeight;
  const colCenterX = colX + COL_W / 2;

  // 1-5. fersahtaysa: çift tık kart aç, tek tık ortala
  if (fersah <= 5) {
    if (adim >= 2) {
      openM(sno, ayetler[0] || 1, nuzulData);
    } else {
      const hedefTx = vpW / 2 - colCenterX * scale;
      const hedefTy = Math.max(vpH * 0.08, ty);
      animateTo(hedefTx, hedefTy, scale, fersah, 500);
    }
    return;
  }

  // Uzaktaysa: direkt 5. fersaha git, tıklanan noktayı ortala
  const hedefFersah = 5;
  const hedefScale = fersahToScale(hedefFersah);
  const hedefTx = vpW / 2 - colCenterX * hedefScale;
  const hedefTy = Math.max(vpH * 0.08, ty);
  animateTo(hedefTx, hedefTy, hedefScale, hedefFersah, 900);
}

// ── TÜMÜNÜ GÖSTER (21. FERSAH) ───────────────────────────────────────
function fitTumunuGoster() {
  const vp = document.getElementById('vp');
  const vpW = vp.clientWidth;
  const vpH = vp.clientHeight;
  const totalW = totalCols * COL_W;
  const hedefTx = (vpW - totalW * fitScale) / 2;
  const hedefTy = vpH * 0.12;
  animateTo(hedefTx, hedefTy, fitScale, 13, 800);
}

// ── SCROLL ZOOM ───────────────────────────────────────────────────────
// Apple mouse: deltaX = yatay, deltaY = dikey
// deltaY > 0 = aşağı scroll = zoom out (fersah artar)
// deltaY < 0 = yukarı scroll = zoom in (fersah azalır)
let lastScrollTime = 0;
function handleScroll(e, vpRect) {
  const now = Date.now();
  const dx = e.deltaX, dy = e.deltaY;

  if (Math.abs(dx) > Math.abs(dy) * 1.5) {
    // Yatay kayma — pan
    tx -= dx * 1.4;
    applyT();
    return;
  }

  // Dikey → zoom (throttle: 250ms arayla kademe)
  if (now - lastScrollTime < 120) return;
  lastScrollTime = now;

  // Pivot: farenin olduğu nokta
  const px = e.clientX - vpRect.left;
  const py = e.clientY - vpRect.top;

  // dy > 0: aşağı scroll = zoom out (uzaklaş, fersah artar)
  // dy < 0: yukarı scroll = zoom in (yaklaş, fersah azalır)
  const normalized = dy > 0 ? 1 : -1;
  if (normalized > 0) {
    // Zoom out — uzaklaş
    if (fersah >= 13) return;
    const yeniFersah = Math.min(13, fersah + 1);
    zoomPivot(yeniFersah, px, py, 280);
  } else {
    // Zoom in — yaklaş
    if (fersah <= 1) return;
    const yeniFersah = Math.max(1, fersah - 1);
    zoomPivot(yeniFersah, px, py, 280);
  }
}

function zoomPivot(yeniFersah, pivotX, pivotY, dur) {
  const yeniScale = fersahToScale(yeniFersah);
  // Pivot noktası sabit kalsın
  const wx = (pivotX - tx) / scale;
  const wy = (pivotY - ty) / scale;
  const hedefTx = pivotX - wx * yeniScale;
  const hedefTy = pivotY - wy * yeniScale;
  animateTo(hedefTx, hedefTy, yeniScale, yeniFersah, dur);
}

// ── YIL BANDI ────────────────────────────────────────────────────────
// Sütun 0 (Fatiha/nüzul 1) = 610 yılı → sağda: x = (N-1)*COL_W
// Sütun N-1 (son nüzul) = 632 yılı → solda: x = 0
// Yıl bandı: 610'dan 632'ye, SAĞdan SOLA
// Segment i: yıl (610+i), x başlangıcı = (N - colOffset) * COL_W
function buildYearBand(N) {
  const yb = document.getElementById('year-band');
  yb.innerHTML = '';
  const yillar = 22; // 610-631 (632 dahil)
  const colsPerYil = N / yillar;

  // Sağdan sola: ilk yıl (610) sağda, son yıl (631+) solda
  // Yıl bandını ters sırada ekleyeceğiz, direction:rtl ile değil,
  // pozisyonu manuel vereceğiz
  for (let i = 0; i < yillar; i++) {
    const yil = 610 + i;
    const cols = i === yillar - 1
      ? N - Math.round(colsPerYil) * (yillar - 1)
      : Math.round(colsPerYil);
    const seg = document.createElement('div');
    let cls = 'yb-seg ';
    if (yil === 622) cls += 'yb-h';
    else if (yil < 622) cls += 'yb-m';
    else cls += 'yb-me';
    seg.className = cls;
    seg.style.width = (cols * COL_W) + 'px';
    seg.style.height = YB_H + 'px';

    // X pozisyonu: bu yılın sütunları sağdan N'e yakın
    // Yıl 0 (610): sütunlar en sağda → x = (N - round(colsPerYil)) * COL_W
    // Yıl i: x = (N - round(colsPerYil)*(i+1)) * COL_W
    const xPos = (N - Math.round(colsPerYil) * (i + 1)) * COL_W;
    seg.style.position = 'absolute';
    seg.style.left = Math.max(0, xPos) + 'px';

    if (yil === 622) seg.textContent = '✦ HİCRET 622';
    else if (yil === 610) seg.textContent = '▶ İLK VAHİY 610';
    else if (yil === 631) seg.textContent = '◼ 632';
    else seg.textContent = String(yil);
    yb.appendChild(seg);
  }
}


// ── SAHNE ────────────────────────────────────────────────────────────
function buildScene(nuzul) {
  document.getElementById('loading').style.display = 'none';
  const world = document.getElementById('world');
  world.innerHTML = '';
  const N = nuzul.length;
  totalCols = N;

  // fitScale hesapla: tüm sütunlar + biraz boşluk sığsın
  const vp = document.getElementById('vp');
  const vpW = vp.clientWidth;
  const vpH = vp.clientHeight;
  fitScale = (vpW * 0.92) / (N * COL_W);

  // Başlangıç: 21. fersah (tümü görünür)
  fersah = 21;
  scale = fitScale;
  tx = (vpW - N * COL_W * fitScale) / 2;
  ty = vpH * 0.12;

  nuzul.forEach((n, i) => {
    const sno = n.sure_no;
    const s = SURELER[sno] || {ar:'', tr:''};
    const med = MEDENI.has(sno);
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0) ? n.ayetler_liste : ayetDizi(n.ayetler);

    const col = document.createElement('div');
    col.className = 'nc';

    // Sağdan sola: sütun 0 en sağda
    const colX = (N - 1 - i) * COL_W;
    col.style.left = colX + 'px';
    col.style.top = YB_H + 'px';
    col.dataset.nuzulIdx = i;
    col.dataset.sno = sno;
    col.dataset.ayetBas = (n.ayetler_liste && n.ayetler_liste[0]) || 1;

    // SURE KARTI
    const nh = document.createElement('div');
    nh.className = 'nh ' + (med ? 'medeni' : 'mekki');
    nh.innerHTML = `<div class="nh-n">${n.sira}</div><div class="nh-ar">${s.ar}</div><div class="nh-tr">${s.tr}</div><div class="nh-ay">${n.ayetler}</div><div class="nih">${med ? kubbe() : kabe()}</div>`;

    // Tık: pan mı tıklama mı kontrol et
    let mdX = 0, mdY = 0, nhLastTik = 0;
    nh.addEventListener('mousedown', e => { mdX = e.clientX; mdY = e.clientY; });
    nh.addEventListener('click', e => {
      e.stopPropagation();
      if (Math.abs(e.clientX - mdX) > 5 || Math.abs(e.clientY - mdY) > 5) return;
      const now = Date.now();
      const cift = now - nhLastTik < 400;
      nhLastTik = now;
      tikZoom(colX, i, n, sno, ayetler, cift ? 3 : 1);
    });

    col.appendChild(nh);

    // AYET PİLLERİ
    ayetler.forEach(ano => {
      const p = document.createElement('div');
      p.className = 'ap ' + (med ? 'md' : 'mk');
      const k = `${sno}:${ano}`;
      p.innerHTML = `<div class="ap-n">${ano}</div><div class="ap-ar">${AR[k] || '·'}</div>`;
      let amdX = 0, amdY = 0;
      p.addEventListener('mousedown', e => { amdX = e.clientX; amdY = e.clientY; });
      p.addEventListener('click', e => {
        e.stopPropagation();
        if (Math.abs(e.clientX - amdX) > 5 || Math.abs(e.clientY - amdY) > 5) return;
        const apNow = Date.now();
        const apCift = apNow - (window._lastApTik||0) < 400;
        window._lastApTik = apNow;
        if (fersah <= 5 && apCift) {
          openM(sno, ano, n);
        } else if (fersah <= 5 && !apCift) {
          // tek tık yakın modda: ortala
          const {w, h} = (() => { const v=document.getElementById('vp'); return {w:v.clientWidth,h:v.clientHeight}; })();
          const cx = colX + COL_W/2;
          animateTo(w/2 - cx*scale, h*0.15, scale, fersah, 400);
        } else {
          tikZoom(colX, i, n, sno, ayetler, apCift ? 3 : 1);
        }
      });
      col.appendChild(p);
    });

    world.appendChild(col);
  });

  buildYearBand(N);
  updateFersahGosterge();
  applyT();
}

function ayetDizi(str) {
  if (!str) return [];
  const p = str.split('-').map(s => parseInt(s));
  if (isNaN(p[0])) return [];
  if (p.length === 1) return [p[0]];
  const a = [];
  for (let i = p[0]; i <= p[1] && a.length < 10; i++) a.push(i);
  return a;
}

function kabe() { return `<svg width="12" height="12" viewBox="0 0 13 13"><rect x="1.5" y="3.5" width="10" height="8" rx=".5" fill="rgba(201,169,110,.85)"/><rect x="3.5" y="6.5" width="2.2" height="5" rx=".3" fill="rgba(0,0,12,.6)"/><line x1="0" y1="3.5" x2="13" y2="3.5" stroke="rgba(201,169,110,.55)" stroke-width=".8"/></svg>`; }
function kubbe() { return `<svg width="12" height="12" viewBox="0 0 13 13"><path d="M1.5 9.5 Q6.5 1.5 11.5 9.5Z" fill="rgba(80,190,140,.85)"/><rect x="1.5" y="9.5" width="10" height="3" rx=".3" fill="rgba(80,190,140,.75)"/><line x1="6.5" y1="1.5" x2="6.5" y2=".2" stroke="rgba(80,190,140,.85)" stroke-width=".8"/></svg>`; }
function tarihler(s) {
  const nub = s <= 1 ? "Nübüvvet 1. Yıl" : `Nübüvvet ~${Math.min(13, Math.ceil(s / 12))}. Yıl`;
  const hicri = s <= 80 ? "Hicret Öncesi" : `H. ${Math.ceil((s - 80) / 18) + 1}. Yıl`;
  const miladi = s <= 1 ? "M.S. ~610" : s <= 80 ? `M.S. ~${610 + Math.floor(s / 10)}` : `M.S. ~${622 + Math.ceil((s - 80) / 18)}`;
  return [nub, hicri, miladi];
}

// ── PAN ──────────────────────────────────────────────────────────────
function initPan() {
  const vp = document.getElementById('vp');
  let panning = false, px0 = 0, py0 = 0;
  let velX = 0, velY = 0, lastPx = 0, lastPy = 0;

  vp.addEventListener('mousedown', e => {
    if (e.target.closest('#ov')) return;
    panning = true; px0 = e.clientX; py0 = e.clientY;
    lastPx = e.clientX; lastPy = e.clientY;
    velX = 0; velY = 0;
    vp.classList.add('panning');
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  window.addEventListener('mouseup', () => {
    panning = false;
    vp.classList.remove('panning');
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    // Atalet
    let vx = velX, vy = velY;
    (function glide() {
      if (Math.abs(vx) < 0.3 && Math.abs(vy) < 0.3) return;
      vx *= 0.88; vy *= 0.88;
      tx += vx; ty += vy;
      applyT();
      requestAnimationFrame(glide);
    })();
  });

  window.addEventListener('mousemove', e => {
    if (!panning) return;
    velX = e.clientX - lastPx;
    velY = e.clientY - lastPy;
    tx += e.clientX - lastPx;
    ty += e.clientY - lastPy;
    lastPx = e.clientX; lastPy = e.clientY;
    applyT();
  });

  // Scroll
  const rect = vp.getBoundingClientRect();
  vp.addEventListener('wheel', e => {
    e.preventDefault();
    handleScroll(e, vp.getBoundingClientRect());
  }, { passive: false });

  // Touch
  let lTx = 0, lTy = 0, lPinch = 0;
  vp.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { lTx = e.touches[0].clientX; lTy = e.touches[0].clientY; }
    if (e.touches.length === 2) lPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });
  vp.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      tx += e.touches[0].clientX - lTx;
      ty += e.touches[0].clientY - lTy;
      lTx = e.touches[0].clientX; lTy = e.touches[0].clientY;
      applyT();
    }
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const yeni = d > lPinch ? Math.max(1, fersah - 1) : Math.min(21, fersah + 1);
      zoomPivot(yeni, cx, cy, 250);
      lPinch = d;
    }
  }, { passive: false });
}

// ── YILDIZLAR ────────────────────────────────────────────────────────
function initStars() {
  const cv = document.getElementById('stars');
  function rsz() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
  rsz(); window.addEventListener('resize', rsz);
  const ctx = cv.getContext('2d');
  const S = Array.from({length: 300}, () => ({ x: Math.random() * cv.width, y: Math.random() * cv.height, r: Math.random() * 1.2 + .2, a: Math.random(), s: Math.random() * .008 + .002, d: Math.random() > .5 ? 1 : -1 }));
  const B = Array.from({length: 10}, () => ({ x: Math.random() * cv.width, y: Math.random() * cv.height, r: Math.random() * 1.8 + .8, t: Math.random() * 6.28, sp: Math.random() * .02 + .007 }));
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    S.forEach(s => { s.a += s.s * s.d; if (s.a > 1 || s.a < .08) s.d *= -1; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fillStyle = `rgba(255,255,240,${s.a * .65})`; ctx.fill(); });
    B.forEach(b => { b.t += b.sp; const p = Math.sin(b.t) * .5 + .5; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * (.3 + p * .7), 0, 6.28); ctx.fillStyle = `rgba(201,169,110,${p * .7})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  draw();
}

let tefParts = [], tefIdx = 0;

const SAYFA = 3200;

async function openM(sno, ano, n) {

  document.getElementById('mar').textContent = AR[k] || `﴿ ${ano} ﴾`;
  if(TR[k]) {
    document.getElementById('mml').innerHTML = '<div style="font-size:13.5px;line-height:1.85">' + TR[k] + '</div>';
  } else {
    document.getElementById('mml').innerHTML = '<div style="color:rgba(201,169,110,.3);font-size:11px">Yükleniyor...</div>';
  }
  document.getElementById('ov').classList.add('open');
  durSes();
  if (!TR[k]) {
    try {
      const r = await fetch(`https://api.alquran.cloud/v1/ayah/${sno}:${ano}/tr.diyanet`);
      const d = await r.json();
      if (d?.data?.text) document.getElementById('mml').innerHTML = `<div style="font-size:13.5px;line-height:1.85">${d.data.text}</div>`;
    } catch(e) {}
  }
}

function closeM() { document.getElementById('ov').classList.remove('open'); durSes(); }
document.getElementById('ov').addEventListener('click', e => { if (e.target === document.getElementById('ov')) closeM(); });
function flipM() {
  flipped = !flipped;
  document.getElementById('mflip').classList.toggle('fl', flipped);
  if (flipped) loadTef();
}
function tSayfa(d) { tefIdx = Math.max(0, Math.min(tefParts.length - 1, tefIdx + d)); renderTef(); }
function renderTef() {
  document.getElementById('tbod').textContent = tefParts[tefIdx] || '';
  document.getElementById('tbod').scrollTop = 0;
  document.getElementById('tpi').textContent = `${tefIdx + 1} / ${tefParts.length}`;
  document.getElementById('tpg').disabled = tefIdx === 0;
  document.getElementById('tpi2').disabled = tefIdx === tefParts.length - 1;
  document.getElementById('tpgr').style.display = tefParts.length <= 1 ? 'none' : 'flex';
}
async function loadTef() {
  const s = SURELER[cSure] || {tr: ''};
  document.getElementById('btit').textContent = `${s.tr} · ${cAyet}. Ayet Tefsiri`;
  if (!tefsirTam) {
    if (tefsirYukleniyor) {
      document.getElementById('tbod').innerHTML = '<div class="tload">Tefsir indiriliyor...<br>Lütfen bekleyin.</div>';
      document.getElementById('tpgr').style.display = 'none';
      const wait = setInterval(() => { if (tefsirTam) { clearInterval(wait); bulTef(); } }, 500);
      return;
    }
    document.getElementById('tbod').innerHTML = '<div class="tload">Tefsir yüklenemedi.</div>';
    document.getElementById('tpgr').style.display = 'none';
    return;
  }
  bulTef();
}
function bulTef() {
  const re = new RegExp(`###SURE:${cSure}###[\\s\\S]*?##AYET:${cAyet}(?:-\\d+)?##([\\s\\S]*?)(?=##AYET:|###SURE:|$)`);
  const m = tefsirTam.match(re);
  const metin = m && m[1] ? m[1].trim() : 'Bu ayet için tefsir verisi bulunamadı.';
  const paras = metin.split('\n\n'); tefParts = []; let p = '';
  paras.forEach(par => { const d = p ? p + '\n\n' + par : par; if (d.length > SAYFA && p) { tefParts.push(p); p = par; } else p = d; });
  if (p) tefParts.push(p);
  if (!tefParts.length) tefParts = ['Tefsir bulunamadı.'];
  tefIdx = 0; renderTef();
}

}

// ── SES ──────────────────────────────────────────────────────────────
function togSes() { if (window._sp) durSes(); else basSes(); }
function basSes() {
  if (!cSure || !cAyet) return;
  const n = (cSure - 1) * 1000 + cAyet;
  const a = new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`);
  window._au = a; window._sp = true;
  const btn = document.getElementById('bses'); btn.textContent = '⏹ Dur'; btn.classList.add('pl');
  a.play().catch(() => {});
  a.ontimeupdate = () => { if (a.duration) document.getElementById('afil').style.width = (a.currentTime / a.duration * 100) + '%'; };
  a.onended = () => durSes();
}
function durSes() {
  window._sp = false; if (window._au) try { window._au.pause(); } catch(e) {}
  const b = document.getElementById('bses'); if (b) { b.textContent = '▶ Dinle'; b.classList.remove('pl'); }
  const f = document.getElementById('afil'); if (f) f.style.width = '0%';
}

// ── ARAMA ────────────────────────────────────────────────────────────
let srTimer = null;
function initSearch() {
  const inp = document.getElementById('srch'), res = document.getElementById('sr');
  inp.addEventListener('input', () => {
    clearTimeout(srTimer); const q = inp.value.trim();
    if (!q) { res.classList.remove('open'); return; }
    res.innerHTML = '<div class="srl">Aranıyor...</div>'; res.classList.add('open');
    srTimer = setTimeout(() => doSearch(q), 380);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { clearTimeout(srTimer); if (inp.value.trim()) doSearch(inp.value.trim()); }
    if (e.key === 'Escape') res.classList.remove('open');
  });
  document.addEventListener('click', e => { if (!document.getElementById('srch-wrap').contains(e.target)) res.classList.remove('open'); });
}
function doSearch(q) {
  const res = document.getElementById('sr'), ql = q.toLowerCase(); const hits = [];
  NUZUL.forEach(n => {
    const sno = n.sure_no, s = SURELER[sno] || {ar: '', tr: ''}; const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0) ? n.ayetler_liste : ayetDizi(n.ayetler);
    if (s.tr.toLowerCase().includes(ql) || s.ar.includes(q)) {
      hits.push({sno, ano: ayetler[0] || 1, n, meta: `${s.tr} · Nüzul ${n.sira}`, text: `${n.ayetler}. ayetler · ${MEDENI.has(sno) ? 'Medeni' : 'Mekki'}`});
    }
    ayetler.forEach(ano => {
      const k = `${sno}:${ano}`, meal = TR[k] || '', ar = AR[k] || '';
      if (meal.toLowerCase().includes(ql) || ar.includes(q)) {
        const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const hi = meal.replace(new RegExp(`(${safe})`, 'gi'), '<span class="hl">$1</span>');
        hits.push({sno, ano, n, meta: `${s.tr} · ${ano}. ayet · Nüzul ${n.sira}`, text: hi || ar});
      }
    });
  });
  if (!hits.length) { res.innerHTML = '<div class="srl">Sonuç bulunamadı.</div>'; return; }
  res.innerHTML = hits.slice(0, 40).map(h => `<div class="sri" onclick="srGit(${h.sno},${h.ano},${h.n.sira})"><div class="sri-m">${h.meta}</div><div class="sri-t">${h.text}</div></div>`).join('');
}
function srGit(sno, ano, sira) {
  const n = NUZUL.find(x => x.sira === sira) || NUZUL[0];
  const idx = NUZUL.findIndex(x => x.sira === sira);
  document.getElementById('sr').classList.remove('open');
  document.getElementById('srch').value = '';
  if (idx >= 0) {
    const colX = (totalCols - 1 - idx) * COL_W;
    const vp = document.getElementById('vp');
    const hedefFersah = Math.min(7, fersah);
    const hedefScale = fersahToScale(hedefFersah);
    const hedefTx = vp.clientWidth / 2 - (colX + COL_W / 2) * hedefScale;
    animateTo(hedefTx, ty, hedefScale, hedefFersah, 600, () => openM(sno, ano, n));
  }
}

function siraDegis(sira) {
  if(sira === aktifSira) return;

  document.getElementById('btn-nuzul').classList.toggle('aktif', sira==='nuzul');

  const world = document.getElementById('world');
  const cols = Array.from(world.querySelectorAll('.nc'));
  const N = cols.length;

  if(sira === 'nuzul') {
    // Nüzul sırası: mevcut dataset.nuzulIdx sırasına göre
    cols.sort((a,b) => parseInt(a.dataset.nuzulIdx) - parseInt(b.dataset.nuzulIdx));
  } else {
    // Mushaf sırası: dataset.sno ve dataset.ayetBas sırasına göre
    cols.sort((a,b) => {
      const snoA = parseInt(a.dataset.sno), snoB = parseInt(b.dataset.sno);
      if(snoA !== snoB) return snoA - snoB;
      return parseInt(a.dataset.ayetBas||0) - parseInt(b.dataset.ayetBas||0);
    });
  }

  // Animasyonlu konum değişimi
  cols.forEach((col, newIdx) => {
    const newX = (N - 1 - newIdx) * COL_W;
    col.style.transition = 'left 2s cubic-bezier(.4,0,.2,1)';
    col.style.left = newX + 'px';
  });

  // Animasyon bittikten sonra transition kaldır
  setTimeout(() => {
    cols.forEach(col => { col.style.transition = ''; });
  }, 2100);
}
