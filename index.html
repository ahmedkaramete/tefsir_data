<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — Nüzul Zaman Şeridi</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0b1e}
#app{width:100%;height:100vh;background:#0b0b1e;overflow:hidden;position:relative;font-family:system-ui,sans-serif}
canvas#stars{position:absolute;inset:0;pointer-events:none;z-index:0}

#topbar{
  position:absolute;top:0;left:0;right:0;height:52px;
  background:rgba(11,11,30,.96);
  border-bottom:.5px solid rgba(201,169,110,.22);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:30;gap:10px;
}
.brand-ar{font-family:'Amiri',serif;font-size:18px;color:#c9a96e;direction:rtl;line-height:1}
.brand-sub{font-size:8px;color:rgba(201,169,110,.4);letter-spacing:2px;margin-top:1px}
#srch-wrap{position:relative;flex:1;max-width:260px}
#srch{width:100%;background:rgba(201,169,110,.08);border:.5px solid rgba(201,169,110,.28);border-radius:20px;color:#e8e0d0;padding:6px 12px 6px 28px;font-size:11px;outline:none;}
#srch::placeholder{color:rgba(201,169,110,.3)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
#sr{position:absolute;top:34px;left:0;right:0;min-width:300px;background:rgba(8,8,26,.98);border:.5px solid rgba(201,169,110,.28);border-radius:8px;max-height:300px;overflow-y:auto;display:none;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.7)}
#sr.open{display:block}
#sr::-webkit-scrollbar{width:3px}
#sr::-webkit-scrollbar-thumb{background:rgba(201,169,110,.3)}
.sri{padding:7px 11px;border-bottom:.5px solid rgba(201,169,110,.07);cursor:pointer;display:grid;grid-template-columns:95px 1fr;gap:7px}
.sri:hover{background:rgba(201,169,110,.09)}
.sri-m{font-size:9px;color:rgba(201,169,110,.6);line-height:1.5}
.sri-t{font-size:10.5px;color:rgba(220,210,190,.78);line-height:1.5}
.hl{color:#c9a96e;background:rgba(201,169,110,.14);border-radius:2px;padding:0 2px}
.srl{padding:10px;text-align:center;color:rgba(201,169,110,.38);font-size:10.5px}

.btn-sira{
  background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.15);
  border-radius:16px;color:rgba(255,255,255,.45);padding:5px 11px;font-size:10px;
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.btn-sira:hover{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.4);color:#c9a96e}
.btn-sira.aktif{background:rgba(201,169,110,.14);border-color:rgba(201,169,110,.6);color:#c9a96e}
#btn-fit{
  background:rgba(201,169,110,.1);border:.5px solid rgba(201,169,110,.3);
  border-radius:16px;color:#c9a96e;padding:5px 11px;font-size:10px;
  cursor:pointer;white-space:nowrap;transition:background .15s;flex-shrink:0;
}
#btn-fit:hover{background:rgba(201,169,110,.22)}
#fersah-ind{position:absolute;top:60px;right:14px;font-size:9px;color:rgba(201,169,110,.35);letter-spacing:1px;z-index:10;pointer-events:none}

/* VIEWPORT */
#vp{position:absolute;inset:0;top:52px;overflow:hidden;cursor:grab;z-index:1}
#vp:active{cursor:grabbing}

/* WORLD — tüm içerik burada, scale+translate ile hareket eder */
#world{position:absolute;top:0;left:0;transform-origin:left top;}

/* YIL BANDI — world içinde, kartlarla aynı koordinat sisteminde */
#year-band{
  position:absolute;top:0;left:0;
  display:flex;flex-direction:row-reverse; /* RTL: 610 sağda */
  pointer-events:auto;
  z-index:4;
  height:160px;
}
.yb-seg{
  flex-shrink:0;height:160px;
  display:flex;align-items:flex-end;justify-content:flex-start;
  padding:0 8px 10px;
  border-right:1px solid rgba(201,169,110,.15);
  white-space:nowrap;cursor:pointer;
  transition:background .2s;
}
.yb-mekke{background:linear-gradient(to bottom,rgba(201,169,110,.01),rgba(201,169,110,.08));color:rgba(201,169,110,.72)}
.yb-mekke:hover{background:linear-gradient(to bottom,rgba(201,169,110,.04),rgba(201,169,110,.15))}
.yb-hicr{background:linear-gradient(to bottom,rgba(255,210,80,.03),rgba(255,210,80,.16));color:rgba(255,215,90,.95);border-color:rgba(255,210,80,.45)}
.yb-hicr:hover{background:linear-gradient(to bottom,rgba(255,210,80,.07),rgba(255,210,80,.25))}
.yb-medine{background:linear-gradient(to bottom,rgba(80,190,140,.01),rgba(80,190,140,.08));color:rgba(80,190,140,.72)}
.yb-medine:hover{background:linear-gradient(to bottom,rgba(80,190,140,.04),rgba(80,190,140,.15))}
.yb-lbl{pointer-events:none} /* yıl etiketi — scale'den bağımsız boyut için */

/* SÜTUNLAR */
.nc{position:absolute;display:flex;flex-direction:column;align-items:center;width:72px;user-select:none;-webkit-user-select:none;}

/* 3D KART SARMALAYICI — salınım animasyonu burada */
.nh-wrap{
  width:64px;
  perspective:320px; /* orta derinlik */
  flex-shrink:0;
}

/* SURE KARTI — rotateY animasyonu */
.nh{
  width:64px;
  background:linear-gradient(160deg,rgba(32,30,62,.96),rgba(20,18,46,.96));
  border:.5px solid rgba(201,169,110,.36);
  border-radius:6px;padding:5px 3px;text-align:center;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  transform-style:preserve-3d;
  /* Salınım animasyonu JS ile kontrol edilecek */
}
.nh.mekki{border-left:2px solid rgba(201,169,110,.6)}
.nh.medeni{border-left:2px solid rgba(80,190,140,.6)}
.nh:hover{
  border-color:rgba(201,169,110,.8)!important;
  box-shadow:0 0 18px rgba(201,169,110,.22);
  transform:scale(1.33)!important; /* %33 büyüme hover'da */
  z-index:10;
  position:relative;
}
/* 3D yan yüz efekti — box-shadow ile simüle */
.nh::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:6px;
  box-shadow:inset -4px 0 8px rgba(0,0,0,.4), inset 0 -3px 6px rgba(0,0,0,.3);
  pointer-events:none;
}

.nh-n{font-size:7.5px;color:rgba(201,169,110,.52)}
.nh-ar{font-size:12px;color:#d4b47a;font-family:'Amiri',serif;direction:rtl;line-height:1.35;margin:2px 0 1px}
.nh-tr{font-size:7px;color:rgba(220,215,200,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.nh-ay{font-size:6.5px;color:rgba(201,169,110,.3);margin-top:1px}
.nih{display:flex;justify-content:center;gap:3px;margin-top:3px}

.ap{
  width:56px;min-height:27px;
  background:rgba(255,255,255,.055);border:.5px solid rgba(255,255,255,.1);
  border-radius:4px;margin-top:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;padding:3px 2px;
  transition:background .12s,border-color .12s,transform .15s;
  user-select:none;-webkit-user-select:none;
}
.ap:hover{background:rgba(201,169,110,.16);border-color:rgba(201,169,110,.45);transform:scale(1.33);z-index:10;position:relative;}
.ap.mk{border-left:1.5px solid rgba(201,169,110,.5)}
.ap.md{border-left:1.5px solid rgba(80,190,140,.5)}
.ap-n{font-size:7.5px;color:rgba(201,169,110,.5)}
.ap-ar{font-size:8px;color:rgba(230,220,200,.5);font-family:'Amiri',serif;direction:rtl;text-align:center;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.leg{position:absolute;bottom:26px;right:14px;z-index:10;display:flex;flex-direction:column;gap:4px}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(201,169,110,.5)}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#hint{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(201,169,110,.2);letter-spacing:1px;pointer-events:none;white-space:nowrap;z-index:10}

#loading{position:absolute;inset:52px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;gap:14px}
.ldot{display:flex;gap:8px}
.ldot span{width:7px;height:7px;border-radius:50%;background:#c9a96e;animation:ldp 1.2s infinite}
.ldot span:nth-child(2){animation-delay:.2s}.ldot span:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.ltxt{font-size:13px;color:rgba(201,169,110,.5);font-family:'Amiri',serif}
.ltxt2{font-size:10px;color:rgba(201,169,110,.3);letter-spacing:2px;margin-top:4px}

#ov{position:absolute;inset:52px 0 0;background:rgba(4,4,18,.88);z-index:50;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#ov.open{display:flex}
#modal{width:480px;max-width:95vw;height:520px;background:linear-gradient(145deg,#0e0e2c,#181838);border:.5px solid rgba(201,169,110,.28);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;animation:mpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes mpop{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
.mf{padding:20px;display:flex;flex-direction:column;overflow:hidden;flex:1}
.mcl{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,.3);font-size:17px;cursor:pointer;z-index:5}
.mcl:hover{color:rgba(255,255,255,.75)}
.mbdg{display:inline-flex;align-items:center;gap:5px;background:rgba(201,169,110,.1);border:.5px solid rgba(201,169,110,.2);border-radius:20px;padding:3px 10px;font-size:10px;color:#c9a96e;margin-bottom:8px;width:fit-content}
.mds{display:flex;gap:4px;margin-bottom:10px;flex-shrink:0;flex-wrap:wrap}
.dsb{font-size:8px;padding:2px 7px;border-radius:3px}
.ds1{background:rgba(201,169,110,.12);color:rgba(201,169,110,.8)}
.ds2{background:rgba(100,180,160,.12);color:rgba(100,180,160,.8)}
.ds3{background:rgba(140,140,210,.12);color:rgba(140,140,210,.8)}
.mar{font-family:'Amiri',serif;font-size:21px;line-height:1.9;direction:rtl;text-align:right;color:#f0e8d8;border-bottom:.5px solid rgba(255,255,255,.07);padding-bottom:10px;margin-bottom:10px;flex-shrink:0}
.mml{font-size:13px;line-height:1.8;color:rgba(220,210,195,.88);flex:1;overflow-y:auto}
.mml::-webkit-scrollbar{width:2px}
.mml::-webkit-scrollbar-thumb{background:rgba(201,169,110,.3)}
.mact{display:flex;gap:7px;margin-top:10px;flex-shrink:0}
.bs{background:rgba(201,169,110,.07);border:.5px solid rgba(201,169,110,.26);color:#c9a96e;padding:9px 14px;border-radius:7px;font-size:11px;cursor:pointer;flex:1}
.bs:hover{background:rgba(201,169,110,.14)}
.bs.pl{background:rgba(201,169,110,.22);border-color:#c9a96e}
.abar{height:2px;background:rgba(201,169,110,.1);border-radius:1px;margin-top:5px;flex-shrink:0}
.afil{height:100%;background:#c9a96e;width:0%;transition:width .3s;border-radius:1px}
</style>
</head>
<body>
<div id="app">
  <canvas id="stars"></canvas>

    <div>
      <div class="brand-ar">القرآن الكريم</div>

    </div>
    <div id="srch-wrap">
      <svg class="si" width="13" height="13" viewBox="0 0 16 16" fill="none">

        <path d="M10 10l3 3" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round"/>

  </div>
  <div id="hint">TIK · KART AÇ &nbsp;|&nbsp; ÇİFT TIK · ZOOM &amp; ORTALA &nbsp;|&nbsp; SCROLL · ZOOM &nbsp;|&nbsp; SÜRÜKLE · GEZİN</div>

    <div class="ldot"><span></span><span></span><span></span></div>

  <div id="ov">
    <div id="modal" style="position:relative">
      <button class="mcl" onclick="closeM()">✕</button>
      <div class="mf">
        <div class="mbdg" id="mbdg"></div>
        <div class="mds" id="mds"></div>
        <div class="mar" id="mar"></div>
        <div class="mml" id="mml"></div>
        <div class="mact">
          <button class="bs" id="bses" onclick="togSes()">▶ Dinle</button>
        </div>
        <div class="abar"><div class="afil" id="afil"></div></div>
      </div>
    </div>
  </div>
</div>

// ── SABİTLER ─────────────────────────────────────────────────────────
const COL_W = 72;
const YB_H = 160;
const FERSAH_SAYISI = 13;
const ZOOM_CARPAN = 1.30;

// ── DURUM ────────────────────────────────────────────────────────────
let NUZUL = [], aktifSira = 'nuzul';
let fitScale = 1, scale = 1, fersah = 13, tx = 0, ty = 0;
let cSure = null, cAyet = null, cNuzul = null;
let srTimer = null, animFrame = null;
let lastScrollTime = 0;

// ── YARDIMCI ─────────────────────────────────────────────────────────
function vpSize(){const v=document.getElementById('vp');return{w:v.clientWidth,h:v.clientHeight};}
function kabe(){return`<svg width="12" height="12" viewBox="0 0 13 13"><rect x="1.5" y="3.5" width="10" height="8" rx=".5" fill="rgba(201,169,110,.85)"/><rect x="3.5" y="6.5" width="2.2" height="5" rx=".3" fill="rgba(0,0,12,.6)"/><line x1="0" y1="3.5" x2="13" y2="3.5" stroke="rgba(201,169,110,.5)" stroke-width=".8"/></svg>`}
function kubbe(){return`<svg width="12" height="12" viewBox="0 0 13 13"><path d="M1.5 9.5 Q6.5 1.5 11.5 9.5Z" fill="rgba(80,190,140,.85)"/><rect x="1.5" y="9.5" width="10" height="3" rx=".3" fill="rgba(80,190,140,.75)"/><line x1="6.5" y1="1.5" x2="6.5" y2=".2" stroke="rgba(80,190,140,.85)" stroke-width=".8"/></svg>`}
function tarihler(s){
  const nub=s<=1?"Nübüvvet 1. Yıl":`Nübüvvet ~${Math.min(13,Math.ceil(s/12))}. Yıl`;
  const hicri=s<=80?"Hicret Öncesi":`H. ${Math.ceil((s-80)/18)+1}. Yıl`;
  const miladi=s<=1?"M.S. ~610":s<=80?`M.S. ~${610+Math.floor(s/10)}`:`M.S. ~${622+Math.ceil((s-80)/18)}`;
  return[nub,hicri,miladi];
}
function ayetDizi(str){
  if(!str)return[];
  const p=str.split('-').map(s=>parseInt(s));
  if(isNaN(p[0]))return[];
  if(p.length===1)return[p[0]];
  const a=[];for(let i=p[0];i<=p[1]&&a.length<12;i++)a.push(i);
  return a;
}
function fersahToScale(f){return fitScale*Math.pow(ZOOM_CARPAN,FERSAH_SAYISI-f);}
function scaleToFersah(s){return FERSAH_SAYISI-Math.log(s/fitScale)/Math.log(ZOOM_CARPAN);}

// ── TRANSFORM ────────────────────────────────────────────────────────
function applyT(){
  const w=document.getElementById('world');
  w.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  // Yıl bandı yazı boyutu scale'den bağımsız olsun
  updateYearBandFontSize();
  // Fersah göstergesi
  const f=Math.round(scaleToFersah(scale));
  document.getElementById('fersah-ind').textContent=`${Math.max(1,Math.min(13,f))}. FERSAH`;
}

// Yıl bandı yazılarını scale'e ters oranda büyüt — hep aynı görünür
function updateYearBandFontSize(){
  const segs=document.querySelectorAll('.yb-lbl');
  const fontSize=Math.round(14/scale*10)/10; // scale arttıkça küçülür, azalınca büyür
  segs.forEach(s=>{
    s.style.fontSize=Math.max(8,Math.min(22,fontSize))+'px';
    s.style.fontWeight=s.dataset.hicr?'800':'600';
  });
}

// ── ANİMASYON ────────────────────────────────────────────────────────
function animateTo(targetTx,targetTy,targetScale,dur,onDone){
  if(animFrame)cancelAnimationFrame(animFrame);
  const s0=scale,tx0=tx,ty0=ty,t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/dur);
    const e=1-Math.pow(1-p,3);
    scale=s0+(targetScale-s0)*e;
    tx=tx0+(targetTx-tx0)*e;
    ty=ty0+(targetTy-ty0)*e;
    fersah=Math.round(scaleToFersah(scale));
    applyT();
    if(p<1)animFrame=requestAnimationFrame(step);
    else{scale=targetScale;tx=targetTx;ty=targetTy;fersah=Math.round(scaleToFersah(scale));applyT();if(onDone)onDone();}
  }
  animFrame=requestAnimationFrame(step);
}

// ── FIT ALL ───────────────────────────────────────────────────────────
function fitAll(){
  const N=NUZUL.length;if(!N)return;
  const{w,h}=vpSize();
  fitScale=(w*0.94)/(N*COL_W);
  fersah=FERSAH_SAYISI;
  const s=fitScale;
  const ttx=(w-N*COL_W*s)/2;
  const tty=h*0.18;
  animateTo(ttx,tty,s,700);
}

// ── ZOOM PIVOT ────────────────────────────────────────────────────────
function zoomPivot(yeniFersah,pivotX,pivotY,dur){
  yeniFersah=Math.max(1,Math.min(FERSAH_SAYISI,yeniFersah));
  const yeniScale=fersahToScale(yeniFersah);
  const wx=(pivotX-tx)/scale;
  const wy=(pivotY-ty)/scale;
  const htx=pivotX-wx*yeniScale;
  const hty=pivotY-wy*yeniScale;
  fersah=yeniFersah;
  animateTo(htx,hty,yeniScale,dur||350);
}

// ── YIL BANDI ─────────────────────────────────────────────────────────
function buildYearBand(N){
  const yb=document.getElementById('year-band');
  yb.innerHTML='';
  yb.style.width=(N*COL_W)+'px';
  yb.style.height=YB_H+'px';
  // Nüzul sırasında göster
  if(aktifSira!=='nuzul'){yb.style.display='none';return;}
  yb.style.display='flex';
  const yilSayisi=22;
  const colsPerYil=N/yilSayisi;
  for(let y=0;y<yilSayisi;y++){
    const yr=610+y;
    const cols=y===yilSayisi-1?N-Math.round(colsPerYil)*(yilSayisi-1):Math.round(colsPerYil);
    const seg=document.createElement('div');
    const isHicr=yr===622;
    seg.className='yb-seg '+(isHicr?'yb-hicr':yr<622?'yb-mekke':'yb-medine');
    seg.style.width=(cols*COL_W)+'px';
    // Tıklanabilir — o yılın ortasına git
    const colStart=Math.round(colsPerYil*y);
    const colMid=colStart+Math.round(cols/2);
    seg.addEventListener('click',()=>zoomToYil(colMid,N));
    // Yazı — scale'den bağımsız span
    const lbl=document.createElement('span');
    lbl.className='yb-lbl';
    if(isHicr)lbl.dataset.hicr='1';
    lbl.textContent=isHicr?'✦ HİCRET 622':yr===610?'▶ 610':yr===631?'◼ 632':String(yr);
    seg.appendChild(lbl);
    yb.appendChild(seg);
  }
  updateYearBandFontSize();
}

function zoomToYil(colMid,N){
  const{w,h}=vpSize();
  const colWorldX=(N-1-colMid)*COL_W+COL_W/2;
  const hedefFersah=5;
  const hedefScale=fersahToScale(hedefFersah);
  fersah=hedefFersah;
  animateTo(w/2-colWorldX*hedefScale,h*0.2,hedefScale,700);
}

// ── 3D SALINİM ANİMASYONU ────────────────────────────────────────────
// Kartlar -15° ile +15° arasında 7 saniyede salınır
let salinimT=0;
function salinimGuncelle(){
  salinimT+=16/7000*Math.PI*2; // 7 saniyede tam tur (2π)
  const aci=Math.sin(salinimT)*15; // -15 ile +15 arası
  document.querySelectorAll('.nh').forEach(nh=>{
    if(!nh.matches(':hover')){
      nh.style.transform=`rotateY(${aci}deg)`;
    }
  });
  requestAnimationFrame(salinimGuncelle);
}

// ── SAHNE ─────────────────────────────────────────────────────────────
function buildScene(nuzul){
  document.getElementById('loading').style.display='none';
  const world=document.getElementById('world');
  // Kartları temizle (year-band'ı koru)
  Array.from(world.children).forEach(c=>{if(c.id!=='year-band')c.remove();});
  const N=nuzul.length;

  nuzul.forEach((n,i)=>{
    const sno=n.sure_no;
    const s=SURELER[sno]||{ar:'',tr:''};
    const med=MEDENI.has(sno);
    const ayetler=(n.ayetler_liste&&n.ayetler_liste.length>0)?n.ayetler_liste:ayetDizi(n.ayetler);
    const colWorldX=(N-1-i)*COL_W;

    const col=document.createElement('div');
    col.className='nc';
    col.style.left=colWorldX+'px';
    col.style.top=YB_H+'px';
    col.dataset.nuzulIdx=i;
    col.dataset.sno=sno;
    col.dataset.ayetBas=ayetler[0]||1;
    col.dataset.colWorldX=colWorldX;

    // Sure kartı
    const wrap=document.createElement('div');
    wrap.className='nh-wrap';
    const nh=document.createElement('div');
    nh.className='nh '+(med?'medeni':'mekki');
    nh.innerHTML=`<div class="nh-n">${n.sira}</div><div class="nh-ar">${s.ar}</div><div class="nh-tr">${s.tr}</div><div class="nh-ay">${n.ayetler}</div><div class="nih">${med?kubbe():kabe()}</div>`;

    // Tık: 5px eşik, tek tık modal, çift tık zoom
    let mdX=0,mdY=0,lastTik=0;
    nh.addEventListener('mousedown',e=>{mdX=e.clientX;mdY=e.clientY;});
    nh.addEventListener('click',e=>{
      e.stopPropagation();
      if(Math.abs(e.clientX-mdX)>5||Math.abs(e.clientY-mdY)>5)return;
      const now=Date.now();
      const cift=now-lastTik<400;
      lastTik=now;
      if(cift){
        // Çift tık: zoom + ortala
        zoomOrtala(colWorldX,N);
      } else {
        // Tek tık: kart aç
        openM(sno,ayetler[0]||1,n);
      }
    });

    wrap.appendChild(nh);
    col.appendChild(wrap);

    // Ayet pilleri
    ayetler.forEach(ano=>{
      const p=document.createElement('div');
      p.className='ap '+(med?'md':'mk');
      const k=`${sno}:${ano}`;
      p.innerHTML=`<div class="ap-n">${ano}</div><div class="ap-ar">${AR[k]||'·'}</div>`;
      let amdX=0,amdY=0,aLastTik=0;
      p.addEventListener('mousedown',e=>{amdX=e.clientX;amdY=e.clientY;});
      p.addEventListener('click',e=>{
        e.stopPropagation();
        if(Math.abs(e.clientX-amdX)>5||Math.abs(e.clientY-amdY)>5)return;
        const now=Date.now();
        const cift=now-aLastTik<400;
        aLastTik=now;
        if(cift){
          zoomOrtala(colWorldX,N);
        } else {
          openM(sno,ano,n);
        }
      });
      col.appendChild(p);
    });

    world.appendChild(col);
  });

  buildYearBand(N);
  fitAll();
  salinimGuncelle(); // sadece ilk kez başlat (zaten loop)
}

function zoomOrtala(colWorldX,N){
  const{w,h}=vpSize();
  const cx=colWorldX+COL_W/2;
  const hedefFersah=Math.max(1,fersah-3);
  const hedefScale=fersahToScale(hedefFersah);
  fersah=hedefFersah;
  animateTo(w/2-cx*hedefScale,h*0.2,hedefScale,700);
}

// ── MUSHAF SIRASI ─────────────────────────────────────────────────────
let aktifSiraVal='nuzul';
function siraDegis(sira){
  if(sira===aktifSiraVal)return;
  aktifSiraVal=sira;
  aktifSira=sira;
  document.getElementById('btn-nuzul').classList.toggle('aktif',sira==='nuzul');
  document.getElementById('btn-mushaf').classList.toggle('aktif',sira==='mushaf');

  // Yıl bandı: nüzulde göster, mushafte gizle
  const yb=document.getElementById('year-band');
  yb.style.display=sira==='nuzul'?'flex':'none';

  const world=document.getElementById('world');
  const cols=Array.from(world.querySelectorAll('.nc'));
  const N=cols.length;

  if(sira==='nuzul'){
    cols.sort((a,b)=>parseInt(a.dataset.nuzulIdx)-parseInt(b.dataset.nuzulIdx));
  } else {
    cols.sort((a,b)=>{
      const sa=parseInt(a.dataset.sno),sb=parseInt(b.dataset.sno);
      if(sa!==sb)return sa-sb;
      return parseInt(a.dataset.ayetBas||0)-parseInt(b.dataset.ayetBas||0);
    });
  }
  cols.forEach((col,newIdx)=>{
    const newX=(N-1-newIdx)*COL_W;
    col.dataset.colWorldX=newX;
    col.style.transition='left 2s cubic-bezier(.4,0,.2,1)';
    col.style.left=newX+'px';
  });
  setTimeout(()=>cols.forEach(col=>col.style.transition=''),2100);
}

// ── PAN & SCROLL ──────────────────────────────────────────────────────
function initInteraction(){
  const vp=document.getElementById('vp');
  let panAktif=false,panX=0,panY=0,panHareket=false;

  vp.addEventListener('mousedown',e=>{
    if(e.target.closest('#ov'))return;
    panAktif=true;panX=e.clientX;panY=e.clientY;panHareket=false;
    document.body.style.userSelect='none';
    document.body.style.webkitUserSelect='none';
  });
  window.addEventListener('mouseup',()=>{
    panAktif=false;
    document.body.style.userSelect='';
    document.body.style.webkitUserSelect='';
  });
  window.addEventListener('mousemove',e=>{
    if(!panAktif)return;
    const dx=e.clientX-panX,dy=e.clientY-panY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)panHareket=true;
    tx+=dx;ty+=dy;panX=e.clientX;panY=e.clientY;applyT();
  });

  // VP boş alan tıklaması — yok (kartlar hallediyor)

  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=vp.getBoundingClientRect();
    const px=e.clientX-rect.left,py=e.clientY-rect.top;
    if(Math.abs(e.deltaX)>Math.abs(e.deltaY)*1.2){
      tx-=e.deltaX*1.2;applyT();return;
    }
    const now=Date.now();
    if(now-lastScrollTime<130)return;
    lastScrollTime=now;
    const yeni=e.deltaY>0?fersah+1:fersah-1;
    zoomPivot(yeni,px,py,300);
  },{passive:false});

  // Touch
  let lTx=0,lTy=0,lPinch=0;
  vp.addEventListener('touchstart',e=>{
    if(e.touches.length===1){lTx=e.touches[0].clientX;lTy=e.touches[0].clientY;}
    if(e.touches.length===2)lPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  vp.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      tx+=e.touches[0].clientX-lTx;ty+=e.touches[0].clientY-lTy;
      lTx=e.touches[0].clientX;lTy=e.touches[0].clientY;applyT();
    }
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const rect=vp.getBoundingClientRect();
      zoomPivot(d<lPinch?fersah+1:fersah-1,cx-rect.left,cy-rect.top,200);
      lPinch=d;
    }
  },{passive:false});
}

// ── YILDIZLAR ─────────────────────────────────────────────────────────
function initStars(){
  const cv=document.getElementById('stars');
  function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);
  const ctx=cv.getContext('2d');
  const S=Array.from({length:280},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.1+.2,a:Math.random(),s:Math.random()*.007+.002,d:Math.random()>.5?1:-1}));
  const B=Array.from({length:8},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6+.7,t:Math.random()*6.28,sp:Math.random()*.018+.006}));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    S.forEach(s=>{s.a+=s.s*s.d;if(s.a>1||s.a<.08)s.d*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fillStyle=`rgba(255,255,240,${s.a*.6})`;ctx.fill();});
    B.forEach(b=>{b.t+=b.sp;const p=Math.sin(b.t)*.5+.5;ctx.beginPath();ctx.arc(b.x,b.y,b.r*(.3+p*.7),0,6.28);ctx.fillStyle=`rgba(201,169,110,${p*.65})`;ctx.fill();});
    requestAnimationFrame(draw);
  }draw();
}

// ── MODAL ─────────────────────────────────────────────────────────────
async function openM(sno,ano,n){
  cSure=sno;cAyet=ano;cNuzul=n;
  const s=SURELER[sno]||{ar:'',tr:''};
  const med=MEDENI.has(sno);
  document.getElementById('mbdg').innerHTML=`${med?kubbe():kabe()} <span>${s.tr} · ${ano}. Ayet · Nüzul ${n.sira}</span>`;
  const[nub,hicri,miladi]=tarihler(n.sira);
  document.getElementById('mds').innerHTML=`<span class="dsb ds1">${nub}</span><span class="dsb ds2">${hicri}</span><span class="dsb ds3">${miladi}</span>`;
  const k=`${sno}:${ano}`;
  document.getElementById('mar').textContent=AR[k]||`﴿ ${ano} ﴾`;
  document.getElementById('mml').innerHTML=TR[k]
    ?`<div style="font-size:13.5px;line-height:1.85">${TR[k]}</div>`
    :'<div style="color:rgba(201,169,110,.3);font-size:11px">Yükleniyor...</div>';
  document.getElementById('ov').classList.add('open');
  durSes();
  if(!TR[k]){
    try{
      const r=await fetch(`https://api.alquran.cloud/v1/ayah/${sno}:${ano}/tr.diyanet`);
      const d=await r.json();
      if(d?.data?.text)document.getElementById('mml').innerHTML=`<div style="font-size:13.5px;line-height:1.85">${d.data.text}</div>`;
    }catch(e){}
  }
}
function closeM(){document.getElementById('ov').classList.remove('open');durSes();}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeM();});

function togSes(){if(window._sp)durSes();else basSes();}
function basSes(){
  if(!cSure||!cAyet)return;
  const n=(cSure-1)*1000+cAyet;
  const a=new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`);
  window._au=a;window._sp=true;
  const btn=document.getElementById('bses');btn.textContent='⏹ Dur';btn.classList.add('pl');
  a.play().catch(()=>{});
  a.ontimeupdate=()=>{if(a.duration)document.getElementById('afil').style.width=(a.currentTime/a.duration*100)+'%';};
  a.onended=()=>durSes();
}
function durSes(){
  window._sp=false;if(window._au)try{window._au.pause();}catch(e){}
  const b=document.getElementById('bses');if(b){b.textContent='▶ Dinle';b.classList.remove('pl');}
  const f=document.getElementById('afil');if(f)f.style.width='0%';
}

// ── ARAMA ─────────────────────────────────────────────────────────────
function initSearch(){
  const inp=document.getElementById('srch'),res=document.getElementById('sr');
  inp.addEventListener('input',()=>{
    clearTimeout(srTimer);const q=inp.value.trim();
    if(!q){res.classList.remove('open');return;}
    res.innerHTML='<div class="srl">Aranıyor...</div>';res.classList.add('open');
    srTimer=setTimeout(()=>doSearch(q),380);
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){clearTimeout(srTimer);if(inp.value.trim())doSearch(inp.value.trim());}
    if(e.key==='Escape')res.classList.remove('open');
  });
  document.addEventListener('click',e=>{if(!document.getElementById('srch-wrap').contains(e.target))res.classList.remove('open');});
}
function doSearch(q){
  const res=document.getElementById('sr'),ql=q.toLowerCase();const hits=[];
  NUZUL.forEach(n=>{
    const sno=n.sure_no,s=SURELER[sno]||{ar:'',tr:''};
    const ayetler=(n.ayetler_liste&&n.ayetler_liste.length>0)?n.ayetler_liste:ayetDizi(n.ayetler);
    if(s.tr.toLowerCase().includes(ql)||s.ar.includes(q)){
      hits.push({sno,ano:ayetler[0]||1,n,meta:`${s.tr} · Nüzul ${n.sira}`,text:`${n.ayetler}. ayetler`});
    }
    ayetler.slice(0,5).forEach(ano=>{
      const k=`${sno}:${ano}`,meal=TR[k]||'',ar=AR[k]||'';
      if(meal.toLowerCase().includes(ql)||ar.includes(q)){
        const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        const hi=meal.replace(new RegExp(`(${safe})`,'gi'),'<span class="hl">$1</span>');
        hits.push({sno,ano,n,meta:`${s.tr} · ${ano}. ayet`,text:hi||ar});
      }
    });
  });
  if(!hits.length){res.innerHTML='<div class="srl">Sonuç bulunamadı.</div>';return;}
  res.innerHTML=hits.slice(0,35).map(h=>`<div class="sri" onclick="srGit(${h.sno},${h.ano},${h.n.sira})"><div class="sri-m">${h.meta}</div><div class="sri-t">${h.text}</div></div>`).join('');
}
function srGit(sno,ano,sira){
  const N=NUZUL.length;
  const idx=NUZUL.findIndex(x=>x.sira===sira);
  if(idx>=0){
    const colWorldX=(N-1-idx)*COL_W;
    const n=NUZUL[idx];
    const{w,h}=vpSize();
    const cx=colWorldX+COL_W/2;
    const hedefFersah=3;
    const hs=fersahToScale(hedefFersah);
    fersah=hedefFersah;
    animateTo(w/2-cx*hs,h*0.2,hs,600,()=>openM(sno,ano,n));
  }
  document.getElementById('sr').classList.remove('open');
  document.getElementById('srch').value='';
}

// ── BAŞLAT ────────────────────────────────────────────────────────────
async function init(){
  initStars();
  initInteraction();
  initSearch();
  try{
    const r=await fetch(NUZUL_URL);
    NUZUL=await r.json();
    buildScene(NUZUL);
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:rgba(201,169,110,.5);font-size:12px;text-align:center">Veri yüklenemedi.</div>';
    console.error(e);
  }
}
init();
</script>
